name: CI

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Run tests
        run: go test ./...

      - uses: ko-build/setup-ko@v0.8
        env:
          KO_DOCKER_REPO: docker.io/${{ vars.DOCKERHUB_USERNAME }}/issue-tracker

      - env:
          auth_token: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "${auth_token}" | ko login index.docker.io \
            --username ${{ vars.DOCKERHUB_USERNAME }} \
            --password-stdin
          ko build --bare ./cmd/server --tags ${{ github.sha }},latest
