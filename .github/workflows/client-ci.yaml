name: Client CI

on:
  push:
    branches:
      - main
    paths:
      - "client/**"

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        # Ensures the runner has the latest LTS Node.js available for any
        # runner-level scripts and satisfies CI tooling requirements.
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Nixpacks
        run: |
          curl -fsSL "https://github.com/railwayapp/nixpacks/releases/download/v1.41.0/nixpacks-v1.41.0-x86_64-unknown-linux-musl.tar.gz" \
            -o /tmp/nixpacks.tar.gz
          tar -xzf /tmp/nixpacks.tar.gz -C /tmp
          sudo mv /tmp/nixpacks /usr/local/bin/nixpacks
          echo "Nixpacks version: $(nixpacks --version)"

      - name: Build Docker image
        run: nixpacks build ./client --name issue-tracker-client

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push image
        run: |
          docker tag issue-tracker-client ${{ vars.DOCKERHUB_USERNAME }}/issue-tracker-client:${{ github.sha }}
          docker tag issue-tracker-client ${{ vars.DOCKERHUB_USERNAME }}/issue-tracker-client:latest
          docker push ${{ vars.DOCKERHUB_USERNAME }}/issue-tracker-client:${{ github.sha }}
          docker push ${{ vars.DOCKERHUB_USERNAME }}/issue-tracker-client:latest

