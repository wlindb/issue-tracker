name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"

jobs:
  ci:
    name: Lint and Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test
