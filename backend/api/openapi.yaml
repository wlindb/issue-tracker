openapi: "3.0.3"

info:
  title: Issue Tracker API
  version: "1.0.0"
  description: REST API for the issue tracker application.

servers:
  - url: /api/v1

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    IssueStatus:
      type: string
      enum: [backlog, todo, in_progress, done, cancelled]

    IssuePriority:
      type: string
      enum: [none, urgent, high, medium, low]

    User:
      type: object
      required: [id, email, name, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        email:
          type: string
          format: email
          x-go-type: string
        name:        { type: string }
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }

    Project:
      type: object
      required: [id, identifier, name, ownerId, issueCount, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        identifier:  { type: string }
        name:        { type: string }
        description: { type: string, nullable: true }
        ownerId:
          type: string
          format: uuid
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        issueCount:  { type: integer }
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }

    Issue:
      type: object
      required: [id, identifier, projectId, title, status, priority, labels, reporterId, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        identifier:  { type: string }
        projectId:
          type: string
          format: uuid
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        title:       { type: string }
        description: { type: string, nullable: true }
        status:      { $ref: "#/components/schemas/IssueStatus" }
        priority:    { $ref: "#/components/schemas/IssuePriority" }
        labels:      { type: array, items: { type: string } }
        assigneeId:
          type: string
          format: uuid
          nullable: true
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        reporterId:
          type: string
          format: uuid
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }

    Comment:
      type: object
      required: [id, issueId, authorId, body, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        issueId:
          type: string
          format: uuid
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        authorId:
          type: string
          format: uuid
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        body:      { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Workspace:
      type: object
      required: [id, name, ownerId, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        name: { type: string }
        ownerId:
          type: string
          format: uuid
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # Pagination — oapi-codegen has no generics support; spell out each page type
    WorkspacePage:
      type: object
      required: [items]
      properties:
        items:      { type: array, items: { $ref: "#/components/schemas/Workspace" } }
        nextCursor: { type: string, nullable: true }

    ProjectPage:
      type: object
      required: [items]
      properties:
        items:      { type: array, items: { $ref: "#/components/schemas/Project" } }
        nextCursor: { type: string, nullable: true }

    IssuePage:
      type: object
      required: [items]
      properties:
        items:      { type: array, items: { $ref: "#/components/schemas/Issue" } }
        nextCursor: { type: string, nullable: true }

    CommentPage:
      type: object
      required: [items]
      properties:
        items:      { type: array, items: { $ref: "#/components/schemas/Comment" } }
        nextCursor: { type: string, nullable: true }

    Error:
      type: object
      required: [code, message]
      properties:
        code:    { type: string }
        message: { type: string }

    # ── Request bodies ──────────────────────────────────────────────────────
    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:        { type: string }
        description: { type: string, nullable: true }

    UpdateProjectRequest:
      type: object
      required: [name]
      properties:
        name:        { type: string }
        description: { type: string, nullable: true }

    CreateIssueRequest:
      type: object
      required: [projectId, title, status, priority]
      properties:
        projectId:
          type: string
          format: uuid
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        title:       { type: string }
        description: { type: string, nullable: true }
        status:      { $ref: "#/components/schemas/IssueStatus" }
        priority:    { $ref: "#/components/schemas/IssuePriority" }
        assigneeId:
          type: string
          format: uuid
          nullable: true
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid

    UpdateIssueTitleRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }

    UpdateIssueDescriptionRequest:
      type: object
      required: [description]
      properties:
        description: { type: string, nullable: true }

    UpdateIssueStatusRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/IssueStatus" }

    UpdateIssuePriorityRequest:
      type: object
      required: [priority]
      properties:
        priority: { $ref: "#/components/schemas/IssuePriority" }

    UpdateIssueAssigneeRequest:
      type: object
      required: [assigneeId]
      properties:
        assigneeId:
          type: string
          format: uuid
          nullable: true
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid

    SearchIssueRequest:
      type: object
      required: [query]
      properties:
        query: { type: string, minLength: 1 }

    CreateCommentRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1 }

  parameters:
    WorkspaceIdParam:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        x-go-type: uuid.UUID
        x-go-type-import:
          path: github.com/google/uuid

    ProjectIdParam:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        x-go-type: uuid.UUID
        x-go-type-import:
          path: github.com/google/uuid

    IssueIdParam:
      name: issueId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        x-go-type: uuid.UUID
        x-go-type-import:
          path: github.com/google/uuid

    CommentIdParam:
      name: commentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        x-go-type: uuid.UUID
        x-go-type-import:
          path: github.com/google/uuid

    CursorParam:
      name: cursor
      in: query
      required: false
      schema: { type: string }

    LimitParam:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }

  responses:
    BadRequest:
      description: Invalid request payload or parameters.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid authentication token.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated user lacks permission.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    UnprocessableEntity:
      description: Semantic validation error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotImplemented:
      description: Endpoint not yet implemented.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    InternalServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

paths:

  /workspaces:
    get:
      operationId: listWorkspaces
      summary: List workspaces the authenticated user belongs to.
      tags: [workspaces]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of workspaces.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkspacePage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

    post:
      operationId: createWorkspace
      summary: Create a new workspace.
      tags: [workspaces]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWorkspaceRequest" }
      responses:
        "201":
          description: Workspace created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /workspaces/{workspaceId}:
    parameters:
      - { $ref: "#/components/parameters/WorkspaceIdParam" }

    get:
      operationId: getWorkspace
      summary: Get a single workspace by ID.
      tags: [workspaces]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Workspace details.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /workspaces/{workspaceId}/projects:
    parameters:
      - { $ref: "#/components/parameters/WorkspaceIdParam" }

    get:
      operationId: listProjects
      summary: List projects accessible to the authenticated user.
      tags: [projects]
      parameters:
        - { $ref: "#/components/parameters/CursorParam" }
        - { $ref: "#/components/parameters/LimitParam" }
      responses:
        "200":
          description: Paginated list of projects.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectPage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

    post:
      operationId: createProject
      summary: Create a new project.
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProjectRequest" }
      responses:
        "201":
          description: Project created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /workspaces/{workspaceId}/projects/{projectId}:
    parameters:
      - { $ref: "#/components/parameters/WorkspaceIdParam" }
      - { $ref: "#/components/parameters/ProjectIdParam" }

    get:
      operationId: getProject
      summary: Get a single project by ID.
      tags: [projects]
      responses:
        "200":
          description: Project details.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

    put:
      operationId: updateProject
      summary: Replace a project's mutable fields.
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProjectRequest" }
      responses:
        "200":
          description: Updated project.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

    delete:
      operationId: deleteProject
      summary: Delete a project and all its issues.
      tags: [projects]
      responses:
        "204": { description: Project deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /workspaces/{workspaceId}/issues:
    parameters:
      - { $ref: "#/components/parameters/WorkspaceIdParam" }

    get:
      operationId: listIssues
      summary: List issues with optional filters.
      tags: [issues]
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
            x-go-type: uuid.UUID
            x-go-type-import:
              path: github.com/google/uuid
        - { $ref: "#/components/parameters/CursorParam" }
        - { $ref: "#/components/parameters/LimitParam" }
        - name: status
          in: query
          required: false
          schema: { $ref: "#/components/schemas/IssueStatus" }
        - name: priority
          in: query
          required: false
          schema: { $ref: "#/components/schemas/IssuePriority" }
        - name: assigneeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
            x-go-type: uuid.UUID
            x-go-type-import:
              path: github.com/google/uuid
      responses:
        "200":
          description: Paginated list of issues.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IssuePage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

    post:
      operationId: createIssue
      summary: Create a new issue.
      tags: [issues]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateIssueRequest" }
      responses:
        "201":
          description: Issue created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Issue" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /workspaces/{workspaceId}/issues/search:
    parameters:
      - { $ref: "#/components/parameters/WorkspaceIdParam" }

    post:
      operationId: searchIssues
      summary: Search issues by a query string.
      tags: [issues]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SearchIssueRequest" }
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "501": { $ref: "#/components/responses/NotImplemented" }

  /workspaces/{workspaceId}/issues/{issueId}:
    parameters:
      - { $ref: "#/components/parameters/WorkspaceIdParam" }
      - { $ref: "#/components/parameters/IssueIdParam" }

    get:
      operationId: getIssue
      summary: Get a single issue by ID.
      tags: [issues]
      responses:
        "200":
          description: Issue details.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Issue" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

    delete:
      operationId: deleteIssue
      summary: Delete an issue and its comments.
      tags: [issues]
      responses:
        "204": { description: Issue deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /workspaces/{workspaceId}/issues/{issueId}/title:
    parameters:
      - { $ref: "#/components/parameters/WorkspaceIdParam" }
      - { $ref: "#/components/parameters/IssueIdParam" }

    put:
      operationId: updateIssueTitle
      summary: Update the title of an issue.
      tags: [issues]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateIssueTitleRequest" }
      responses:
        "200":
          description: Updated issue.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Issue" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /workspaces/{workspaceId}/issues/{issueId}/description:
    parameters:
      - { $ref: "#/components/parameters/WorkspaceIdParam" }
      - { $ref: "#/components/parameters/IssueIdParam" }

    put:
      operationId: updateIssueDescription
      summary: Update the description of an issue.
      tags: [issues]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateIssueDescriptionRequest" }
      responses:
        "200":
          description: Updated issue.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Issue" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /workspaces/{workspaceId}/issues/{issueId}/status:
    parameters:
      - { $ref: "#/components/parameters/WorkspaceIdParam" }
      - { $ref: "#/components/parameters/IssueIdParam" }

    put:
      operationId: updateIssueStatus
      summary: Update the status of an issue.
      tags: [issues]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateIssueStatusRequest" }
      responses:
        "200":
          description: Updated issue.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Issue" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /workspaces/{workspaceId}/issues/{issueId}/priority:
    parameters:
      - { $ref: "#/components/parameters/WorkspaceIdParam" }
      - { $ref: "#/components/parameters/IssueIdParam" }

    put:
      operationId: updateIssuePriority
      summary: Update the priority of an issue.
      tags: [issues]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateIssuePriorityRequest" }
      responses:
        "200":
          description: Updated issue.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Issue" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /workspaces/{workspaceId}/issues/{issueId}/assigneeId:
    parameters:
      - { $ref: "#/components/parameters/WorkspaceIdParam" }
      - { $ref: "#/components/parameters/IssueIdParam" }

    put:
      operationId: updateIssueAssignee
      summary: Update the assignee of an issue.
      tags: [issues]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateIssueAssigneeRequest" }
      responses:
        "200":
          description: Updated issue.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Issue" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /workspaces/{workspaceId}/issues/{issueId}/comments:
    parameters:
      - { $ref: "#/components/parameters/WorkspaceIdParam" }
      - { $ref: "#/components/parameters/IssueIdParam" }

    get:
      operationId: listComments
      summary: List comments on an issue.
      tags: [comments]
      parameters:
        - { $ref: "#/components/parameters/CursorParam" }
        - { $ref: "#/components/parameters/LimitParam" }
      responses:
        "200":
          description: Paginated list of comments.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommentPage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

    post:
      operationId: createComment
      summary: Add a comment to an issue.
      tags: [comments]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCommentRequest" }
      responses:
        "201":
          description: Comment created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /workspaces/{workspaceId}/comments/{commentId}:
    parameters:
      - { $ref: "#/components/parameters/WorkspaceIdParam" }
      - { $ref: "#/components/parameters/CommentIdParam" }

    delete:
      operationId: deleteComment
      summary: Delete a comment.
      tags: [comments]
      responses:
        "204": { description: Comment deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
