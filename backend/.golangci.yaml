version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    # correctness
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    # style
    - revive
    - gocritic
    - misspell
    # safety
    - gosec
    - bodyclose
    - contextcheck
    - wrapcheck
    - nolintlint
    # complexity
    - gocyclo
    - funlen
    - dupl
    # exhaustiveness
    - exhaustive
    # architecture boundary enforcement
    - depguard

  settings:
    gocyclo:
      min-complexity: 15
    funlen:
      lines: 80
      statements: 50
    exhaustive:
      default-signifies-exhaustive: true
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: package-comments
        - name: error-return
        - name: unused-parameter
    wrapcheck:
      ignoreSigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
    depguard:
      rules:
        domain-isolation:
          files:
            - "**/internal/domain/**"
          deny:
            - pkg: "github.com/wlindb/issue-tracker/internal/api"
              desc: "domain layer must not import api"
            - pkg: "github.com/wlindb/issue-tracker/internal/infrastructure"
              desc: "domain layer must not import infrastructure"
            - pkg: "github.com/wlindb/issue-tracker/internal/config"
              desc: "domain layer must not import config"
        auth-no-tracker:
          files:
            - "**/internal/domain/auth/**"
          deny:
            - pkg: "github.com/wlindb/issue-tracker/internal/domain/tracker"
              desc: "auth domain must not import tracker domain"
        tracker-no-auth:
          files:
            - "**/internal/domain/tracker/**"
          deny:
            - pkg: "github.com/wlindb/issue-tracker/internal/domain/auth"
              desc: "tracker domain must not import auth domain"
        api-no-infra:
          files:
            - "**/internal/api/**"
          deny:
            - pkg: "github.com/wlindb/issue-tracker/internal/infrastructure"
              desc: "api layer must not import infrastructure; depend on domain interfaces only"

  exclusions:
    rules:
      - path: _test\.go
        linters: [wrapcheck, dupl, gosec, funlen]
      - path: internal/infrastructure/generated/
        linters: [wrapcheck, errcheck, gocritic, revive]
      - path: internal/api/generated/
        linters: [wrapcheck, errcheck, gocritic, revive]

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/wlindb/issue-tracker
